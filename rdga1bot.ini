[Threading]
# i5-6200U: 4 логічних ядра. Core 0 = L2 Client, Core 1 = bot main, Core 2 = VisionWorker
Enabled       = true
CPUAffinity   = true
MainCore      = 1
VisionThread  = true
VisionCore    = 2
GeodataThread = false
GeodataCore   = 3

[TargetingTuning]
# |dx| мінімапи для повороту. dx=25 = звичайний артефакт → підняти вище 25 щоб не крутитись.
MinimapDxThreshold = 30

[Breadcrumbs]
Enabled         = false
RecordDistance  = 100.0
MaxCount        = 200
StuckThreshold  = 4
BacktrackRange  = 600.0

[NavMesh]
Enabled       = false
CollectPoints = true
SaveOnExit    = true
PointsFile    = navmesh_points.pts
NavMeshFile   = navmesh.bin
CollectDist   = 10.0

[BehaviorTree]
