[General]
WindowTitle = Lineage II
Debug = true
LogLevel = DEBUG

[Character]
# Mage, Archer, Spoiler, Treasure Hunter, ...
Class = Treasure Hunter

[Targeting]
# Клавіші макросів /target на хотбарі (через кому).
MacroKeys = F7,F8,F9,F10,F11
# Screen-Y фільтр: моб з cy < порогу вважається "далеко" → ESC, шукаємо ближчого.
# 0 = вимкнено. Для підземель/коридорів: 0 або 150. Для відкритих спотів (пустеля): 350-450.
NearbyYThreshold = 0
# Скільки разів відхилити "далекий" таргет → після цього приймаємо будь-який.
MaxFarRejects = 5

[Attack]
AttackKeys = F1
AttackWait = 0.5
AttackWatchdog = 20
AttackDelays = 
SpoilKey = F3
SweepKey = F4

[Loot]
LootKey = F4
LootCount = 10
# false = пропустити очікування авто-лута (300мс), йти одразу до TARGETING
LootEnabled = true

[Potions]
HP_Key = F6
HP_Threshold = 70
MP_Key = F7
MP_Threshold = 40
CP_Key = F8
CP_Threshold = 90

[Buffs]
# false = не бафатись взагалі (ігноруємо BuffInterval/BuffKeys/BuffUseAltB)
BuffEnabled = true
# Клавіші self-buff (через кому, порожньо = вимкнено)
BuffKeys =
BuffInterval = 900
BuffUseAltB = true
BuffPostCombatCooldown = 20
BuffTabX = 908
BuffTabY = 287
BuffProfileX = 976
BuffProfileY = 241

[Special]
# Клавіша дії на мертвий таргет (Pokemon тощо); порожньо = вимкнено
PokemonKey = F3

[Telegram]
BotToken = 
ChatID = 
NotifyOnDeath = true
StatsInterval = 3600

[Stats]
# Авто-збереження stats кожні N kills (0 = вимкнено)
AutoSaveInterval = 50

[Movement]
# Дефолт: стрілки. W/S/A/D відкривають чат в L2!
Forward     = Up
Back        = Down
RotateLeft  = Left
RotateRight = Right

[Navigation]
# Детекція застрягання через порівняння кадрів після WalkForward.
# Якщо після WalkForward кадр не змінився — персонаж застряг → ротація для обходу.
StuckDetection = true
# Скільки тіків "не рухаємось" поспіль → евакуаційна ротація (600мс)
StuckThreshold = 2
# Sobel детекція стін попереду (experimental — false positives на NPC/колонах)
WallDetection = false
# Lucas-Kanade optical flow (experimental — додає ~10мс на тік)
FlowDetection = true

[Patrol]
# Патруль маршрутом коли немає мобів (мінімапа порожня N спроб)
# PatrolEnabled = false → звичайна ротація на місці
PatrolEnabled = false
# Скільки спроб без мобів → старт patrol (дефолт 30 ≈ 4-5с)
PatrolTriggerAttempts = 30
# Маршрут: кроки через кому. F=вперед B=назад L=ліво R=право + мілісекунди
# Приклад для коридору: вперед 2с → поворот право 500мс → вперед 1с
# PatrolPath = F2000,R500,F1000,L500,F1500
PatrolPath =

[MemReader]
# Читання пам'яті L2 процесу (Wine) через /proc/PID/mem.
# Enabled = false → вимкнено, використовується OpenCV детекція (дефолт).
# Як знайти offsets: запустити Cheat Engine під Wine, знайти HP/MP/CP/XYZ,
# записати static pointer address та offset chain в поля нижче (hex).
# ************ 
# *****3!******
# ************
Enabled = true
ProcName = l2.exe
# UseKLBase: використовувати playerBase від KnownList напряму (без статичного PlayerPtr).
# PlayerPtr=0x0 + UseKLBase=true → playerBase передається після blindScan.
# Дає валідні XY координати навіть без повного калібрування MemReader.
UseKLBase = true
# Статична адреса в l2.exe (потрібна якщо UseKLBase=false)
PlayerPtr = 0x0
PtrChain =
# Offsets від PlayerObject (hex). 0x0 = не читати це поле.
# XY/Z відомі з offsets_config.h (OFF_PLAYER_X/Y/Z).
# HP/MP/CP поки невідомі — потребують калібрування через --calibrate або Cheat Engine.
HP_Offset    = 0x0
MaxHP_Offset = 0x0
MP_Offset    = 0x0
MaxMP_Offset = 0x0
CP_Offset    = 0x0
MaxCP_Offset = 0x0
PosX_Offset  = 0x24
PosY_Offset  = 0x28
PosZ_Offset  = 0x2C
ShadowMode = true

[KnownList]
# Читання KnownList (мобів/предметів поблизу) з пам'яті Wine/L2 процесу.
# Потребує [MemReader] Enabled=true + правильні PosX/Y/Z_Offset.
# AutoScan=true → автоматичний пошук PlayerBase при першому тіку з координатами.
# OffsetsFile → зберігає/завантажує знайдені offsets (не потребує re-scan).
# readMobsRegionScan: сканує пам'ять напряму без KnownList ptr → не залежить від
# структури KnownList. "4 garbage моби" = OLD readAllAsChars, не region scan.
# **************
# *******2!******
# **************
Enabled = true
AutoScan = true
OffsetsFile = offsets.json
MaxRange = 2500

[Memory]
# **************
# *******1*******
# **************
UseForKillDetect = false
UseForTargetHP   = true
FallbackToOpenCV = true

[Vision]
UseRobustBarDetection = true

[Colors_MyBars]
HPFromHSV = 0,120,70
HPToHSV   = 10,255,200
MPFromHSV = 88,120,70
MPToHSV   = 122,255,200
CPFromHSV = 12,120,70
CPToHSV   = 27,255,200

[Colors_Target]
HPFromHSV = 0,100,90
HPToHSV   = 12,220,160

[Colors_TargetCircles]
GrayBGR = 57,60,66
BlueBGR = 107,48,0
RedBGR  = 0,4,132

[Colors_NPC]
NameFromHSV        = 0,0,240
NameToHSV          = 0,0,255
NameColorThreshold = 0.2

[Delays]
# Варіативні затримки (нормальний розподіл, антидетект)
Enabled      = true
AttackMeanMs = 500
AttackStdMs  = 75
RotateMeanMs = 350
RotateStdMs  = 50
