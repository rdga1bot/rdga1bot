# rdga1bot.example.ini — повний приклад конфігурації
# Скопіюйте в rdga1bot.ini і відредагуйте під себе.
# rdga1bot.ini НЕ комітиться в git (містить Telegram токен).

[General]
WindowTitle = Lineage II
Debug = true
# Рівень логування: DEBUG, INFO, WARNING, ERROR, NONE
LogLevel = INFO

[Character]
# Mage, Archer, Spoiler
Class = Spoiler

[Targeting]
# Клавіші макросів /target на хотбарі (через кому).
# Створіть макроси "/target МобНейм" і призначте на ці слоти.
MacroKeys = 2,3,4,5,6

[Attack]
# Клавіші скілів атаки (ротація по черзі)
AttackKeys = F1
# Затримка між атаками (секунди) — загальна для всіх скілів
AttackWait = 0.5
# Затримки для кожного скілу окремо (порожньо = AttackWait для всіх)
# Приклад для 3 скілів: AttackDelays = 0.5,1.2,0.8
AttackDelays =
# Таймаут watchdog в атаці — перехід до лутингу (секунди)
AttackWatchdog = 60
# Spoil/Sweep для класу Spoiler
SpoilKey = F3
SweepKey = F4

[Loot]
LootKey = F5
# Кількість натискань підбору лута
LootCount = 10

[Potions]
HP_Key = F6
HP_Threshold = 70
MP_Key = F7
MP_Threshold = 40
CP_Key = F8
CP_Threshold = 90

[Buffs]
# Клавіші self-buff по черзі (порожньо = вимкнено)
BuffKeys =
# Інтервал між бафами (секунди)
BuffInterval = 300

[Telegram]
BotToken =
ChatID =
NotifyOnDeath = true
# Інтервал надсилання статистики (секунди, 0 = вимкнено)
StatsInterval = 3600

[Stats]
# Авто-збереження stats кожні N kills (0 = вимкнено)
AutoSaveInterval = 50

[Movement]
# УВАГА: W/S/A/D відкривають чат в L2!
# Дефолт — стрілки клавіатури (не змінювати без потреби)
Forward     = Up
Back        = Down
RotateLeft  = Left
RotateRight = Right

[Vision]
# Робастна детекція барів: медіана по 3 рядках (стійкіше до артефактів)
UseRobustBarDetection = true
# Шлях до WindowsInfo.ini L2 клієнта (для авто-визначення позиції TargetStatusWnd)
# Якщо не вказано або файл не знайдено — використовується дефолт posX=598
# Приклад: WindowsInfoPath = /home/user/lineage2/system/WindowsInfo.ini
WindowsInfoPath =

[Colors_MyBars]
# HSV кольори барів персонажа. Формат: H,S,V
# Значення нижче — виміряні на ElmoreLab (Kamael/Lionna) 2026-03-21
# Якщо бари не визначаються: F12 → calibrate_*.png + HSV-підказки в лозі
#
# УВАГА: m_my_bar_min_height=7 (не 10!) бо L2 HP бар лише ~10px висотою
# HP (червоний):   H=2-12, S=80-250, V=80-160
HPFromHSV = 2,80,80
HPToHSV   = 12,250,160
# MP (синій, ElmoreLab специфіка H=104-115, НЕ 105-110!):
MPFromHSV = 104,80,35
MPToHSV   = 115,255,170
# CP (жовто-оранжевий):
CPFromHSV = 10,80,40
CPToHSV   = 26,255,200

[Colors_Target]
# HSV кольори HP бару цілі (червоний, виміряний на активному таргеті)
HPFromHSV = 0,100,90
HPToHSV   = 12,220,160

[Colors_TargetCircles]
# BGR кольори кружечків вибору цілі
GrayBGR = 57,60,66
BlueBGR = 107,48,0
RedBGR  = 0,4,132

[Colors_NPC]
# HSV кольори тексту імені NPC (білий)
NameFromHSV        = 0,0,240
NameToHSV          = 0,0,255
NameColorThreshold = 0.2
