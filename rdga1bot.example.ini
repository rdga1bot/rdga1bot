# rdga1bot.example.ini — повний приклад конфігурації з описом ВСІХ параметрів
# Скопіюйте в rdga1bot.ini і відредагуйте під себе.
# rdga1bot.ini НЕ комітиться в git (містить Telegram токен).
#
# ─────────────────────────────────────────────────────────────────────────────
# УВІМК/ВИМК МОДУЛІ
# ─────────────────────────────────────────────────────────────────────────────
# [Loot]    LootEnabled   = true/false  — очікування авто-лута після kill
# [Buffs]   BuffEnabled   = true/false  — увімкнути/вимкнути систему бафів
# [Potions] HP_Key/MP_Key/CP_Key — порожньо = зілля вимкнено
# [Special] PokemonKey            — порожньо = Pokemon sweep вимкнено
# [Targeting] NearbyYThreshold=0  — вимкнути Screen-Y фільтр далеких мобів
# [Vision]  UseRobustBarDetection — вимкнути медіанну детекцію барів
# ─────────────────────────────────────────────────────────────────────────────

[General]
# Заголовок вікна гри (пошук через XQueryTree)
WindowTitle = Lineage II
# Виводити debug frame captures (false в продакшені)
Debug = false
# Рівень логування: DEBUG, INFO, WARNING, ERROR, NONE
# DEBUG — дуже детально (MAP, PERF, buff scores)
# INFO  — стандартний (STATE переходи, kills, heartbeat)
# WARNING — тільки проблеми
LogLevel = INFO

[Character]
# Клас персонажа: Mage, Archer, Spoiler, Treasure Hunter (або будь-який рядок)
# Spoiler: автоматично використовує SpoilKey + SweepKey
Class = Treasure Hunter

# ─────────────────────────────────────────────────────────────────────────────
[Targeting]
# ─────────────────────────────────────────────────────────────────────────────
# Основна клавіша таргетингу (/nexttarget макрос на хотбарі)
NextTargetKey = F2

# Резервні /target МобНейм макроси (через кому).
# Активуються після 10+ невдалих F2; тільки F-клавіші (цифри/нумпад пишуть в чат!)
# Приклад: F7=/target Werewolf, F8=/target Dark Elf, тощо
MacroKeys = F7,F8,F9,F10,F11

# Screen-Y фільтр: моб з cy < порогу = "далеко" → ESC, шукати ближчого.
# 0 = вимкнено повністю (рекомендовано для більшості спотів).
# Підземелля/коридори: 200. Відкриті спасти (пустеля): 350-450.
NearbyYThreshold = 0

# Скільки разів відхилити "далекий" таргет → потім приймаємо будь-який.
MaxFarRejects = 5

# ─────────────────────────────────────────────────────────────────────────────
[Attack]
# ─────────────────────────────────────────────────────────────────────────────
# Клавіші скілів атаки (ротація по черзі через кому)
AttackKeys = F1

# Затримка між атаками (секунди) — загальна для всіх скілів
AttackWait = 0.5

# Затримки для кожного скілу окремо (через кому; порожньо = AttackWait для всіх)
# Приклад для 3 скілів: AttackDelays = 0.5,1.2,0.8
AttackDelays =

# Watchdog таймаут атаки (секунди) — якщо kill не детектується → перехід до LOOTING
# Зменшити якщо моби гинуть швидко, збільшити для тривалих боїв
AttackWatchdog = 20

# Spoil/Sweep для класу Spoiler (ігнорується якщо Class != Spoiler)
SpoilKey = F3
SweepKey = F4

# ─────────────────────────────────────────────────────────────────────────────
[Loot]
# ─────────────────────────────────────────────────────────────────────────────
# LootEnabled: керує фазою збору лута після kill.
# true  — надсилає ESC + чекає 300мс для авто-лута гри (стандартно)
# false — пропускає очікування, одразу до TARGETING (максимальна швидкість kill)
#         Корисно якщо авто-лут налаштовано в грі і 300мс не потрібні.
LootEnabled = true

# LootKey/LootCount — резерв для майбутнього ручного лутингу (зараз не використовуються)
LootKey = F5
LootCount = 10

# ─────────────────────────────────────────────────────────────────────────────
[Potions]
# ─────────────────────────────────────────────────────────────────────────────
# Авто-зілля: порожній ключ = модуль вимкнено для цього зілля.
# Якщо гра має авто-поції — залиште порожнім.
HP_Key =
HP_Threshold = 70

MP_Key =
MP_Threshold = 40

CP_Key =
CP_Threshold = 90

# ─────────────────────────────────────────────────────────────────────────────
[Buffs]
# ─────────────────────────────────────────────────────────────────────────────
# BuffEnabled: головний вимикач системи бафів.
# true  — бафається згідно з BuffInterval + BuffKeys/BuffUseAltB
# false — ніколи не бафається (ігнорує всі інші Buff* параметри)
BuffEnabled = true

# Клавіші self-buff (через кому; порожньо якщо BuffUseAltB=true)
BuffKeys =

# Інтервал між бафами (секунди)
BuffInterval = 600

# BuffUseAltB: відкривати вікно баффера через ALT+B і клікати профіль
# true  — ALT+B → знайти вкладку "Баффер" → клікнути профіль "tty"
# false — натиснути клавіші з BuffKeys по черзі
BuffUseAltB = true

# Пауза після kill перед бафом (секунди) — щоб не перебивати бій
BuffPostCombatCooldown = 20

# Координати UI вікна ALT+B (window-relative, НЕ screen coords):
# BuffTabX/Y     — вкладка "Баффер" у вікні баффер-менеджера
# BuffProfileX/Y — профіль (наприклад "tty") у списку профілів
# Якщо шаблони template/buff_tab.png + buff_profile.png знайдено — координати
# використовуються тільки як fallback при низькому score template matching.
BuffTabX = 773
BuffTabY = 297
BuffProfileX = 841
BuffProfileY = 252

# ─────────────────────────────────────────────────────────────────────────────
[Special]
# ─────────────────────────────────────────────────────────────────────────────
# PokemonKey: клавіша макросу "/target Pokemon" + "/useshortcut 2 5"
# Використовується для підбору спеціальних предметів з конкретного моба.
# Порожньо = вимкнено.
PokemonKey =

# ─────────────────────────────────────────────────────────────────────────────
[Telegram]
# ─────────────────────────────────────────────────────────────────────────────
# Telegram нотифікації. Порожні токени = вимкнено.
BotToken =
ChatID =
NotifyOnDeath = true
# Інтервал надсилання статистики (секунди; 0 = вимкнено)
StatsInterval = 3600

# ─────────────────────────────────────────────────────────────────────────────
[Stats]
# ─────────────────────────────────────────────────────────────────────────────
# Авто-збереження stats кожні N kills (0 = вимкнено)
AutoSaveInterval = 50

# ─────────────────────────────────────────────────────────────────────────────
[Movement]
# ─────────────────────────────────────────────────────────────────────────────
# КРИТИЧНО: W/S/A/D відкривають чат в L2 — використовувати ТІЛЬКИ стрілки!
Forward     = Up
Back        = Down
RotateLeft  = Left
RotateRight = Right

# ─────────────────────────────────────────────────────────────────────────────
[Memory]
# ─────────────────────────────────────────────────────────────────────────────
# Feature flags для інтеграції memory read (KnownList) в бойову логіку.
# ВИМАГАЄ: [KnownList] Enabled=true + PlayerBase знайдено blindScan().
#
# Читати HP моба з пам'яті замість OpenCV color detection.
# Точніше і незалежно від HSV калібровки.
# ВИМАГАЄ: відкалібрований charHpOff (offsets.json)
UseForTargetHP   = false

# Instant kill detection: isDead з пам'яті замість 800мс hp=0 debounce.
# Прискорює цикл вбивства на ~800мс/моб (≈ +2 kill/хв при 10.5 kill/хв).
# ВИМАГАЄ: відкалібрований charIsDeadOff (offsets.json)
UseForKillDetect = false

# При збої memory read повертатись до OpenCV (рекомендовано залишити true).
FallbackToOpenCV = true

# ─────────────────────────────────────────────────────────────────────────────
[Navigation]
# ─────────────────────────────────────────────────────────────────────────────
# Memory-based навігація до моба через heading + координати.
# ВИМКНЕНО за замовчуванням — вмикати тільки після калібровки heading.
# Крок 1: ./rdga1bot --calibrate → записати значення heading
# Крок 2: повернутись на 90° → запустити знову → порівняти
# Крок 3: знайти offset що змінився → вписати в [MemReader] Heading_Offset
# Крок 4: встановити UseHeading = true → тестувати
Enabled        = false
AttackRange    = 150.0
AngleTolerance = 0.17
UseHeading     = false

# ─────────────────────────────────────────────────────────────────────────────
[Vision]
# ─────────────────────────────────────────────────────────────────────────────
# Медіанна детекція барів: стійкіша до артефактів рендерингу.
# false = швидший але менш стабільний метод (не рекомендується).
UseRobustBarDetection = true

# Шлях до WindowsInfo.ini L2 клієнта (авто-визначення posX TargetStatusWnd).
# Якщо не вказано → дефолт posX=598 (або авто-калібрування при першому таргеті).
# Приклад: /home/user/lineage2/system/WindowsInfo.ini
WindowsInfoPath =

# ─────────────────────────────────────────────────────────────────────────────
[Colors_MyBars]
# ─────────────────────────────────────────────────────────────────────────────
# HSV кольори барів персонажа. Формат: H,S,V (OpenCV: H=0-180, S/V=0-255)
# Якщо бари не визначаються: натисніть F12 → tmp/calibrate*.png + HSV-підказки в лозі
#
# Значення нижче — виміряні на ElmoreLab Kamael/Lionna (ManyaTheBond, 2026-03-22)
# HP (червоний):
HPFromHSV = 0,75,55
HPToHSV   = 10,255,175
# MP (синій):
MPFromHSV = 88,30,35
MPToHSV   = 122,255,140
# CP (жовтий):
CPFromHSV = 12,80,50
CPToHSV   = 27,255,200

# ─────────────────────────────────────────────────────────────────────────────
[Colors_Target]
# ─────────────────────────────────────────────────────────────────────────────
# HSV кольори HP бару цілі
HPFromHSV = 0,100,90
HPToHSV   = 12,220,160

# ─────────────────────────────────────────────────────────────────────────────
[Colors_TargetCircles]
# ─────────────────────────────────────────────────────────────────────────────
# BGR кольори кружечків вибору цілі (сірий/синій/червоний ореол)
GrayBGR = 57,60,66
BlueBGR = 107,48,0
RedBGR  = 0,4,132

# ─────────────────────────────────────────────────────────────────────────────
[Colors_NPC]
# ─────────────────────────────────────────────────────────────────────────────
# HSV кольори тексту імені NPC (білий плавучий текст над мобом)
NameFromHSV        = 0,0,240
NameToHSV          = 0,0,255
NameColorThreshold = 0.2

# ─────────────────────────────────────────────────────────────────────────────
[Delays]
# ─────────────────────────────────────────────────────────────────────────────
# Варіативні затримки з нормальним розподілом.
# Enabled=false → фіксовані затримки (поведінка як раніше).
Enabled      = false
AttackMeanMs = 500.0
AttackStdMs  = 75.0
RotateMeanMs = 350.0
RotateStdMs  = 50.0
WalkMeanMs   = 800.0
WalkStdMs    = 120.0
PotionMeanMs = 50.0
PotionStdMs  = 15.0

# ─────────────────────────────────────────────────────────────────────────────
[WeightedTargeting]
# ─────────────────────────────────────────────────────────────────────────────
# Зважений вибір цілі. Enabled=false → findNearestMob (як раніше).
# Потребує KnownList.Enabled=true.
Enabled        = false
WeightDistance = 0.5
WeightLowHP    = 0.3
WeightFreshness= 0.2
MaxRange       = 1200.0

# ─────────────────────────────────────────────────────────────────────────────
[Blacklist]
# ─────────────────────────────────────────────────────────────────────────────
# Автоматично додається через [Memory] UseForKillDetect або HP-stable 5с.
# Не потребує окремого налаштування — вмикається через код.
# DurationSec — скільки секунд моб заблокований після HP-stable.
DurationSec = 60.0

# ─────────────────────────────────────────────────────────────────────────────
[Geodata]
# ─────────────────────────────────────────────────────────────────────────────
# Геодата L2J формат (.geo файли). Потрібні файли в GeoPath.
# Без файлів — IsWallBetween() завжди повертає false (нейтральна поведінка).
Enabled = false
GeoPath = ./geodata/
UseJPS  = true
